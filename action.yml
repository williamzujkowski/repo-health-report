name: "Repo Health Report"
description: "Analyze repository health across 6 dimensions and post results"
author: "William Zujkowski"

branding:
  icon: "activity"
  color: "blue"

inputs:
  token:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
  fail-below:
    description: "Fail the workflow if overall score is below this threshold (0-100)"
    required: false
    default: "0"
  repo:
    description: "Repository to analyze (default: current repo)"
    required: false
    default: ${{ github.repository }}
  comment:
    description: "Post results as PR comment (true/false)"
    required: false
    default: "true"

outputs:
  score:
    description: "Overall health score (0-100)"
    value: ${{ steps.report.outputs.score }}
  grade:
    description: "Letter grade (A/B/C/D/F)"
    value: ${{ steps.report.outputs.grade }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run health check
      id: report
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        RESULT=$(npx --yes repo-health-report@latest ${{ inputs.repo }} --json --no-file 2>/dev/null | grep '^{')
        SCORE=$(echo "$RESULT" | jq -r '.score')
        GRADE=$(echo "$RESULT" | jq -r '.grade')
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "result<<RESULTEOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "RESULTEOF" >> $GITHUB_OUTPUT

        echo "## Repo Health Report: ${{ inputs.repo }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Grade: $GRADE ($SCORE/100)**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$RESULT" | jq -r '.dimensions[] | "- \(.name): \(.score)/100"' >> $GITHUB_STEP_SUMMARY

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const score = '${{ steps.report.outputs.score }}';
          const grade = '${{ steps.report.outputs.grade }}';
          const result = JSON.parse(`${{ steps.report.outputs.result }}`);
          const dims = result.dimensions.map(d => `| ${d.name} | ${d.score}/100 |`).join('\n');
          const body = `## 🏥 Repo Health Report\n\n**Grade: ${grade} (${score}/100)**\n\n| Dimension | Score |\n|---|---|\n${dims}\n\n<sub>Generated by [repo-health-report](https://github.com/williamzujkowski/repo-health-report)</sub>`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Check threshold
      if: inputs.fail-below != '0'
      shell: bash
      run: |
        SCORE=${{ steps.report.outputs.score }}
        THRESHOLD=${{ inputs.fail-below }}
        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::Health score $SCORE is below threshold $THRESHOLD"
          exit 1
        fi
