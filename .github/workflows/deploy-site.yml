name: Deploy Dashboard
on:
  push:
    branches: [main]
    paths: ['site/**', 'data/dashboard/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci && npx tsc && node dist/export.js && cd site && npm ci && npx astro build
      - uses: actions/upload-pages-artifact@v4
        with: { path: site/dist }
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
